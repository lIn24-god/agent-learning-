<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lagent - AI 助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f7f7f8;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            padding: 16px 20px;
            background: white;
            border-bottom: 1px solid #e5e5e5;
            font-weight: 600;
            font-size: 1.2rem;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
        }
        .message.user {
            align-self: flex-end;
        }
        .message.assistant {
            align-self: flex-start;
        }
        .message .role {
            font-size: 0.75rem;
            color: #6c6f78;
            margin-bottom: 4px;
            padding-left: 8px;
        }
        .message .bubble {
            background: #f0f0f0;
            padding: 12px 16px;
            border-radius: 20px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .message.user .bubble {
            background: #0084ff;
            color: white;
        }
        .message.assistant .bubble {
            background: #f1f1f1;
            color: #1e1e1e;
        }
        .input-area {
            padding: 16px;
            border-top: 1px solid #e5e5e5;
            background: white;
            display: flex;
            gap: 12px;
        }
        #messageInput {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 28px;
            font-size: 1rem;
            outline: none;
            transition: border 0.2s;
        }
        #messageInput:focus {
            border-color: #0084ff;
        }
        #sendBtn {
            background: #0084ff;
            color: white;
            border: none;
            border-radius: 28px;
            padding: 0 20px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }
        #sendBtn:hover {
            background: #0066cc;
        }
        pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 12px;
            border-radius: 12px;
            overflow-x: auto;
            margin: 8px 0;
        }
        code {
            font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
            font-size: 0.9em;
        }
        p code {
            background: #eaeaea;
            padding: 2px 5px;
            border-radius: 6px;
        }
    </style>
    <!-- 引入 marked 用于渲染 markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">🤖 Lagent · AI Agent</div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
        <input type="text" id="messageInput" placeholder="输入消息... (支持 Markdown)" autofocus>
        <button id="sendBtn">发送</button>
    </div>
</div>

<script>
    let ws = null;
    let currentAssistantMessage = null;
    let currentRawMarkdown = "";   // 存储原始 Markdown 文本
    let currentBubbleElement = null;

    function connectWebSocket() {
        const protocol = location.protocol === "https:" ? "wss:" : "ws:";
        ws = new WebSocket(`${protocol}//${location.host}/ws`);

        ws.onopen = () => {
            console.log("WebSocket 已连接");
            addSystemMessage("✅ 已连接到 AI 助手");
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            switch (data.type) {
                case "chunk":
                    if (!currentAssistantMessage) {
                        // 创建新的助手消息气泡
                        currentAssistantMessage = createMessageElement("assistant", "");
                        currentBubbleElement = currentAssistantMessage.querySelector(".bubble");
                        document.getElementById("messages").appendChild(currentAssistantMessage);
                        scrollToBottom();
                        currentRawMarkdown = "";  // 重置原始文本
                    }
                    // 追加原始文本 chunk
                    currentRawMarkdown += data.content;
                    // 重新渲染完整的 Markdown 到气泡
                    renderMarkdown(currentBubbleElement, currentRawMarkdown);
                    break;
                case "done":
                    // 流结束，重置临时变量（保留最终内容）
                    currentAssistantMessage = null;
                    currentBubbleElement = null;
                    currentRawMarkdown = "";
                    break;
                case "error":
                    addSystemMessage("❌ 错误: " + data.content);
                    // 发生错误时清理
                    if (currentAssistantMessage) {
                        currentAssistantMessage.remove();
                        currentAssistantMessage = null;
                        currentBubbleElement = null;
                        currentRawMarkdown = "";
                    }
                    break;
            }
            scrollToBottom();
        };

        ws.onclose = () => {
            console.log("WebSocket 断开，3秒后重连");
            setTimeout(connectWebSocket, 3000);
        };
    }

    // 渲染 Markdown 到指定 DOM 元素
    function renderMarkdown(element, rawText) {
        if (!rawText) {
            element.innerHTML = " ";
            return;
        }
        // 使用 marked 将原始 Markdown 转为 HTML
        let html = marked.parse(rawText, { async: false });
        element.innerHTML = html;
        // 为代码块添加额外样式（可选）
        element.querySelectorAll("pre code").forEach((block) => {
            block.style.backgroundColor = "#2d2d2d";
            block.style.color = "#f8f8f2";
            block.style.padding = "12px";
            block.style.borderRadius = "8px";
            block.style.display = "block";
            block.style.overflowX = "auto";
        });
    }

    function createMessageElement(role, content) {
        const div = document.createElement("div");
        div.className = `message ${role}`;
        const roleSpan = document.createElement("div");
        roleSpan.className = "role";
        roleSpan.innerText = role === "user" ? "你" : "助手";
        const bubble = document.createElement("div");
        bubble.className = "bubble";
        if (role === "assistant") {
            // 助手消息先留空，稍后填充 HTML
            bubble.innerHTML = "";
        } else {
            bubble.innerText = content;
        }
        div.appendChild(roleSpan);
        div.appendChild(bubble);
        return div;
    }

    function addSystemMessage(text) {
        const div = document.createElement("div");
        div.style.textAlign = "center";
        div.style.fontSize = "0.8rem";
        div.style.color = "#888";
        div.style.margin = "8px";
        div.innerText = text;
        document.getElementById("messages").appendChild(div);
        scrollToBottom();
    }

    function addUserMessage(text) {
        const msgDiv = createMessageElement("user", text);
        document.getElementById("messages").appendChild(msgDiv);
        scrollToBottom();
    }

    function scrollToBottom() {
        const container = document.getElementById("messages");
        container.scrollTop = container.scrollHeight;
    }

    function sendMessage() {
        const input = document.getElementById("messageInput");
        const text = input.value.trim();
        if (!text) return;
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            addSystemMessage("⚠️ 未连接到服务器，请刷新页面");
            return;
        }
        addUserMessage(text);
        input.value = "";
        ws.send(JSON.stringify({ type: "user_message", content: text }));
    }

    connectWebSocket();

    document.getElementById("sendBtn").onclick = sendMessage;
    document.getElementById("messageInput").addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
            e.preventDefault();
            sendMessage();
        }
    });
</script>
</body>
</html>
